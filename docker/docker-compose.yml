version: '3.8'

# smarTODO — local / self-hosted stack
#
# Quick start:
#   cp .env.local.example .env.local   # fill in your values
#   docker compose -f docker/docker-compose.yml up
#
# For day-to-day dev, prefer `supabase start` + `pnpm dev` natively.
# This compose file is for production-like, CI, and self-hosted environments.

services:
  # ── Postgres ────────────────────────────────────────────────────────────────
  supabase-db:
    image: supabase/postgres:15.1.1.78
    ports:
      - '54322:5432'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: smartodo
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ../supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Supabase Studio ──────────────────────────────────────────────────────────
  supabase-studio:
    image: supabase/studio:latest
    ports:
      - '54323:3000'
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
    depends_on:
      supabase-db:
        condition: service_healthy

  # ── Kong API gateway ──────────────────────────────────────────────────────────
  supabase-kong:
    image: kong:2.8.1
    ports:
      - '54321:8000'   # Supabase REST / Auth API
      - '54324:8443'   # Supabase API (SSL)
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
    depends_on:
      supabase-db:
        condition: service_healthy

  # ── GoTrue (auth) ─────────────────────────────────────────────────────────────
  supabase-auth:
    image: supabase/gotrue:latest
    ports:
      - '54325:9999'
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/smartodo?search_path=auth
      GOTRUE_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-for-local-dev-only}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_DISABLE_SIGNUP: 'false'
      API_EXTERNAL_URL: http://localhost:54321
    depends_on:
      supabase-db:
        condition: service_healthy

  # ── Realtime ─────────────────────────────────────────────────────────────────
  supabase-realtime:
    image: supabase/realtime:latest
    environment:
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: smartodo
      PORT: 4000
      JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-for-local-dev-only}
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: 100
    depends_on:
      supabase-db:
        condition: service_healthy

  # ── Storage ──────────────────────────────────────────────────────────────────
  supabase-storage:
    image: supabase/storage-api:latest
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder}
      POSTGREST_URL: http://supabase-kong:8000/rest/v1
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-for-local-dev-only}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/smartodo
      FILE_SIZE_LIMIT: 52428800   # 50 MB
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
    volumes:
      - supabase-storage-data:/var/lib/storage
    depends_on:
      supabase-db:
        condition: service_healthy

  # ── Next.js app ──────────────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://supabase-kong:8000}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-dev}
    ports:
      - '3000:3000'
    environment:
      # Runtime-only secrets (not baked into the image)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      supabase-kong:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health | grep -q "ok" || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  supabase-db-data:
  supabase-storage-data:
